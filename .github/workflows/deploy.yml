name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      S3_BUCKET: myapp-artifact-storage-bucket
      EC2_INSTANCE_ID: i-0227979605b40b0d4   # ✅ FIXED (use real instance ID)
      IAM_ROLE_ARN: arn:aws:iam::654485376127:role/github-actions-deploy-role

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package app
        run: tar -czf app.tar.gz -C app .

      - name: Upload artifact to S3
        run: aws s3 cp app.tar.gz s3://${{ env.S3_BUCKET }}/app.tar.gz

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/app.tar.gz .",
              "tar -xzf app.tar.gz",
              "chmod +x scripts/deploy.sh",
              "./scripts/deploy.sh"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
